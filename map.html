<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Geo Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <a href="index.html" class="btn-icon" id="btn-home" title="Home">🏠</a>
    <button class="btn-icon" id="btn-sidebar" title="Toggle sidebar">☰</button>
    <span class="logo">🗺️ Geo</span>
    <form class="search-box" id="search-form" autocomplete="off">
      <input type="text" id="search-input" placeholder="coffee near Surrey, trails near Whistler, skytrain Gateway..." autofocus>
      <div id="search-history" class="search-history-dropdown" style="display:none"></div>
      <button type="submit">Search</button>
    </form>
    <button class="btn-icon" id="btn-clear" title="Clear search" style="display:none">✕</button>
    <div class="radius-control" id="radius-control">
      <label for="radius-slider">Radius:</label>
      <input type="range" id="radius-slider" min="1" max="50" value="5">
      <span id="radius-value">5 km</span>
    </div>
    <button class="btn-icon" id="btn-weather" title="Weather">☁️</button>
    <button class="btn-icon" id="btn-theme" title="Toggle theme">🌙</button>
    <button class="btn-icon" id="btn-gps" title="My location">📍</button>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-tabs">
        <button data-tab="places" class="active">Places</button>
        <button data-tab="custom">Custom</button>
        <button data-tab="near">Near Me</button>
        <button data-tab="weather">☁️ Weather</button>
        <button data-tab="ferries">⛴️ Ferries</button>
      </div>
      <div class="sidebar-content" id="sidebar-content">
        <div class="empty-state">
          <div class="icon">🗺️</div>
          <div>Search for places, trails, or transit</div>
          <div style="margin-top:8px;font-size:12px;color:var(--text-dim)">
            Try: <em>coffee near Vancouver</em><br>
            <em>trails near Whistler</em><br>
            <em>skytrain Waterfront</em>
          </div>
        </div>
      </div>
    </div>

    <!-- Map -->
    <div class="map-container">
      <div id="map"></div>

      <!-- Map overlay controls -->
      <div class="map-controls">
        <button class="layer-toggle" id="layer-custom" title="Toggle custom places layer">⭐ Custom</button>
        <button class="layer-toggle" id="layer-transit" title="Toggle transit layer">🚇 Transit</button>
        <button class="layer-toggle" id="layer-elevation" title="Toggle elevation query mode">📏 Elevation</button>
        <button class="layer-toggle" id="layer-measure" title="Toggle measurement mode">📐 Measure</button>
        <button class="layer-toggle" id="layer-ferries" title="Toggle ferries layer">⛴️ Ferries</button>
        <button class="layer-toggle" id="btn-legend" title="Show map legend">📖 Legend</button>
        <div class="tile-switcher" id="tile-switcher">
          <button data-tile="Voyager" class="active">Map</button>
          <button data-tile="Topo">Topo</button>
          <button data-tile="Satellite">Sat</button>
        </div>
      </div>

      <!-- Floating GPS share button -->
      <button class="gps-float" id="gps-share-btn" title="Share my GPS location">📍 Share GPS</button>

      <!-- Search this area button -->
      <button class="search-area-btn" id="search-area-btn" title="Search current map view" style="display:none">🔍 Search this area</button>

      <!-- Route Tools panel (Elevation + Measurement) -->
      <div class="elevation-panel" id="elevation-panel" style="display:none">
        <div class="elevation-header">
          <span class="elevation-title">📏 Route Tools</span>
          <button class="elevation-close" id="elevation-close">✕</button>
        </div>
        <div class="route-controls">
          <div class="mode-toggle">
            <label><input type="radio" name="route-mode" value="single" checked> Single segment</label>
            <label><input type="radio" name="route-mode" value="multi"> Multi-point route</label>
          </div>
          <div class="route-buttons">
            <button class="btn-small" id="btn-add-point" title="Add point">+ Add point</button>
            <button class="btn-small" id="btn-remove-last" title="Remove last point">⌫ Remove last</button>
            <button class="btn-small" id="btn-clear-route" title="Clear route">🗑️ Clear route</button>
            <button class="btn-small" id="btn-export-gpx" title="Export GPX">💾 Export GPX</button>
          </div>
        </div>
        <canvas id="elevation-canvas" style="width:100%;height:120px"></canvas>
        <div class="elevation-stats">
          <span id="el-gain">↑--</span>
          <span id="el-loss">↓--</span>
          <span id="el-min">Min: --</span>
          <span id="el-max">Max: --</span>
        </div>
        <div class="measure-stats" id="measure-stats" style="display:none">
          <div>Segment distance: <span id="segment-distance">--</span></div>
          <div>Cumulative distance: <span id="cumulative-distance">--</span></div>
          <div>Elevation gain: <span id="measure-gain">--</span></div>
          <div>Elevation loss: <span id="measure-loss">--</span></div>
        </div>
      </div>

      <!-- Status bar -->
      <div class="status-bar" id="status-bar">
        <span>Ready</span>
        <span></span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Configure API URL — override this before app.js loads if needed
    // window.GEO_API_URL = 'https://your-vps.example.com:8090';
  </script>
  <script src="app.js"></script>
</body>
</html>
